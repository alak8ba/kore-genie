services:

  # ──────────────────────────────────────────────
  # Ollama • serveur LLM local (LLaMA 3)
  # ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: kore-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # Chroma DB • base de données vectorielle
  # ──────────────────────────────────────────────
  chroma:
    image: chromadb/chroma:latest
    container_name: kore-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma-data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────────
  # kore-genie • API Spring Boot
  # ──────────────────────────────────────────────
  kore-genie:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kore-genie
    ports:
      - "8080:8080"
    environment:
      - KORE_GENIE_OLLAMA_BASE_URL=http://ollama:11434
      - KORE_GENIE_OLLAMA_MODEL=llama3
      - KORE_GENIE_OLLAMA_TIMEOUT=120s
      - KORE_GENIE_CHROMA_BASE_URL=http://chroma:8000
      - KORE_GENIE_CHROMA_COLLECTION=kore-genie-docs
      - KORE_GENIE_INGESTION_UPLOAD_DIR=/app/uploads
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      ollama:
        condition: service_healthy
      chroma:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ollama-data:
  chroma-data:
  uploads-data:

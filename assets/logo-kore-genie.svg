<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-genie" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f1500"/>
      <stop offset="100%" style="stop-color:#0d0900"/>
    </linearGradient>
    <filter id="glow-gold">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond hexagonal • même base que kore-batch et kore-hexagonal -->
  <polygon points="100,8 178,52 178,148 100,192 22,148 22,52"
           fill="url(#bg-genie)" stroke="#fbbf24" stroke-width="2"/>

  <!-- Hexagone intérieur décoratif -->
  <polygon points="100,28 162,63 162,137 100,172 38,137 38,63"
           fill="none" stroke="#fbbf24" stroke-width="0.5" opacity="0.3"/>

  <!-- Réseau neuronal • symbole IA -->
  <!-- Noeud central -->
  <circle cx="100" cy="88" r="10" fill="#fbbf24" opacity="0.15" filter="url(#glow-gold)"/>
  <circle cx="100" cy="88" r="5"  fill="#fbbf24" filter="url(#glow-gold)"/>

  <!-- Connexions rayonnantes -->
  <g stroke="#fbbf24" stroke-width="1.5" opacity="0.7" stroke-linecap="round">
    <line x1="100" y1="83" x2="100" y2="65"/>
    <line x1="100" y1="93" x2="100" y2="111"/>
    <line x1="95"  y1="85" x2="79"  y2="75"/>
    <line x1="105" y1="91" x2="121" y2="101"/>
    <line x1="95"  y1="91" x2="79"  y2="101"/>
    <line x1="105" y1="85" x2="121" y2="75"/>
  </g>

  <!-- Noeuds secondaires -->
  <g fill="#fbbf24" filter="url(#glow-gold)">
    <circle cx="100" cy="62"  r="3.5"/>
    <circle cx="100" cy="114" r="3.5"/>
    <circle cx="77"  cy="72"  r="3"/>
    <circle cx="123" cy="104" r="3"/>
    <circle cx="77"  cy="104" r="3"/>
    <circle cx="123" cy="72"  r="3"/>
  </g>

  <!-- Connexions réseau -->
  <g stroke="#fbbf24" stroke-width="0.8" opacity="0.35" stroke-linecap="round">
    <line x1="77"  y1="72"  x2="100" y2="62"/>
    <line x1="123" y1="72"  x2="100" y2="62"/>
    <line x1="77"  y1="104" x2="100" y2="114"/>
    <line x1="123" y1="104" x2="100" y2="114"/>
    <line x1="77"  y1="72"  x2="77"  y2="104"/>
    <line x1="123" y1="72"  x2="123" y2="104"/>
  </g>

  <!-- KORE -->
  <text x="100" y="148" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="700"
        font-size="20" fill="#fbbf24" letter-spacing="3">KORE</text>

  <!-- GENIE -->
  <text x="100" y="166" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="400"
        font-size="11" fill="#fbbf24" opacity="0.6" letter-spacing="5">GENIE</text>
</svg>

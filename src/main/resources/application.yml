spring:
  application:
    name: kore-genie
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

server:
  port: 8080

kore:
  genie:
    ollama:
      base-url: ${KORE_GENIE_OLLAMA_BASE_URL:http://localhost:11434}
      model: ${KORE_GENIE_OLLAMA_MODEL:llama3}
      timeout: ${KORE_GENIE_OLLAMA_TIMEOUT:120s}
    chroma:
      base-url: ${KORE_GENIE_CHROMA_BASE_URL:http://localhost:8000}
      collection: ${KORE_GENIE_CHROMA_COLLECTION:kore-genie-docs}
    ingestion:
      upload-dir: ${KORE_GENIE_INGESTION_UPLOAD_DIR:./uploads}
